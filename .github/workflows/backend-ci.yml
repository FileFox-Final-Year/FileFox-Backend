name: FileFox Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# -------------------- REQUIRED FOR CODEQL --------------------
permissions:
  contents: read
  security-events: write

jobs:

# ------------------ BUILD + TEST ------------------
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test --configuration Release --no-build

# ---------------- SECURITY SCAN ----------------
    - name: Vulnerable packages scan
      run: dotnet list package --vulnerable --include-transitive


# ------------------ CODEQL ------------------
  codeql:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp

    - name: Restore
      run: dotnet restore

    - name: Build for CodeQL
      run: dotnet build --configuration Release --no-restore

    - name: Analyze
      uses: github/codeql-action/analyze@v3
      
# ---------------- INTEGRATION TESTS ----------------
    - name: Integration tests
      run: API_URL=http://localhost:8080 dotnet test FileFox_Backend.Tests --filter "Category=Integration"


# ---------------- ARTIFACTS ----------------
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage
        path: "**/coverage.cobertura.xml"