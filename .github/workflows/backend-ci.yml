name: FileFox Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# -------------------- REQUIRED FOR CODEQL --------------------
permissions:
  contents: read
  security-events: write

jobs:

# ------------------ BUILD + TEST ------------------
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test --configuration Release --no-build

# ---------------- SECURITY SCAN ----------------
    - name: Vulnerable packages scan
      run: dotnet list package --vulnerable --include-transitive


# ------------------ CODEQL ------------------
  codeql:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp

    - name: Restore
      run: dotnet restore

    - name: Build for CodeQL
      run: dotnet build --configuration Release --no-restore

    - name: Analyze
      uses: github/codeql-action/analyze@v3


# ------------------ DOCKER + SECURITY ------------------
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t filefox-api .

    - name: Run API container
      run: |
        docker run -d -p 8080:8080 \
          -e ASPNETCORE_ENVIRONMENT=Testing \
          --name filefox-api filefox-api

    - name: Wait for API startup
      run: sleep 20

    - name: Health check
      run: curl -f http://localhost:8080/health


# ---------------- TRIVY----------------
    - name: Trivy scan
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image filefox-api


# ---------------- INTEGRATION TESTS ----------------
    - name: Integration tests
      run: API_URL=http://localhost:8080 dotnet test FileFox_Backend.Tests --filter "Category=Integration"


# ---------------- ARTIFACTS ----------------
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage
        path: "**/coverage.cobertura.xml"